      pathReg.classList.remove('hidden');
      pathConn.classList.add('hidden');
      btnReg.className  = base + " bg-white text-indigo-600 shadow-sm";
      btnConn.className = base + " text-slate-600 hover:text-slate-900";

      pathReg.classList.add('hidden');
      pathConn.classList.remove('hidden');

  function toggleLanguage() {
    currentLanguage = currentLanguage === 'zh' ? 'en' : 'zh';
    document.getElementById('lang-btn-text').innerText = currentLanguage === 'zh' ? 'English' : '繁體中文';
    document.querySelectorAll('[data-key]').forEach(el => {
      const key = el.getAttribute('data-key');
      if (translations[currentLanguage][key] !== undefined) {
        el.innerHTML = translations[currentLanguage][key];
      }
    });
  }

  /* ── guide: FAQ modal ── */
  const modal    = document.getElementById('qa-modal');
  const modalBox = document.getElementById('qa-modal-box');

  function openQAModal() {
    modal.classList.remove('hidden');
    requestAnimationFrame(() => {
      modal.classList.remove('opacity-0');
      modalBox.classList.remove('scale-95');
      modalBox.classList.add('scale-100');
    });
  }
  function closeQAModal() {
    modal.classList.add('opacity-0');
    modalBox.classList.remove('scale-100');
    modalBox.classList.add('scale-95');
    setTimeout(() => modal.classList.add('hidden'), 300);
  }
  modal.addEventListener('click', e => { if (e.target === modal) closeQAModal(); });
