<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>教師無線網路試營運 — 臺北市立中正高中</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ── base ── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
h1,h2,h3,h4 { margin: 0; }
p { margin: 0; }
a { text-decoration: none; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }

/* ── page shell ── */
.page {
  position: fixed;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transition: opacity 0.35s ease;
}
.page-hidden { opacity: 0 !important; pointer-events: none !important; }
.u-hidden { display: none !important; }

/* ════════════════════════════════════════════
   POSTER PAGE
═══════════════════════════════════════════ */
#page-poster {
  background: #e9f1ed;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 48px 24px;
  font-family: 'Noto Sans TC', sans-serif;
}
.poster {
  position: relative;
  width: 1240px;
  max-width: 100%;
  aspect-ratio: 1240 / 1754;
  background: #ffffff;
  box-shadow: 0 8px 40px rgba(11,59,51,.14);
  overflow: hidden;
}
.p-accent { position:absolute; top:0; left:0; bottom:0; width:18px; background:#0e9e7e; }
.p-body   { position:absolute; inset:0; padding:84px 80px 72px 100px; display:flex; flex-direction:column; }

.p-header     { display:flex; justify-content:space-between; align-items:flex-start; font-size:20px; color:#5d7068; font-weight:500; letter-spacing:.5px; }
.p-org-name   { font-weight:700; color:#16241f; }
.p-org-sub    { font-family:'IBM Plex Mono',monospace; font-size:15px; color:#8a9a93; letter-spacing:1px; margin-top:4px; }
.p-badge      { font-family:'IBM Plex Mono',monospace; color:#0e9e7e; letter-spacing:3px; padding-top:4px; }

.p-title      { margin-top:46px; }
.p-tag        { display:inline-block; background:#e7f4ef; color:#0b7a60; font-size:21px; font-weight:700; letter-spacing:1.5px; padding:9px 18px; border-radius:8px; }
.p-h1         { margin:22px 0 0; font-size:76px; font-weight:900; line-height:1.14; letter-spacing:-1px; color:#16241f; }
.p-subtitle   { margin-top:14px; font-size:30px; font-weight:500; color:#3f8f7c; letter-spacing:.3px; }
.p-audience   { margin-top:22px; font-size:25px; font-weight:500; color:#54665f; }
.p-aud-en     { color:#8a9a93; font-size:21px; }

.p-datecard   { margin-top:36px; background:#0b3b33; border-radius:20px; padding:36px 40px; display:flex; align-items:center; justify-content:space-between; }
.p-date-lbl   { font-family:'IBM Plex Mono',monospace; font-size:17px; letter-spacing:3px; color:#7fc9b4; }
.p-date-num   { margin-top:12px; font-size:66px; font-weight:900; color:#ffffff; line-height:1; }
.p-date-dash  { color:#7fc9b4; }
.p-date-r     { text-align:right; line-height:1.5; }
.p-date-zh    { font-size:22px; color:#aedccf; }
.p-date-en    { font-family:'IBM Plex Mono',monospace; font-size:18px; color:#7fc9b4; margin-top:8px; }

.p-note-hdr   { margin-top:38px; display:flex; align-items:baseline; gap:14px; }
.p-note-ttl   { font-size:26px; font-weight:700; color:#16241f; }
.p-note-en    { font-family:'IBM Plex Mono',monospace; font-size:16px; letter-spacing:2px; color:#9aa9a3; }

.p-card       { margin-top:18px; background:#f1f8f5; border-radius:18px; padding:28px 32px; display:flex; gap:24px; }
.p-card+.p-card { margin-top:14px; }
.p-card-num   { flex:0 0 auto; font-size:36px; font-weight:900; color:#0e9e7e; line-height:1; }
.p-card-body  { flex:1; }
.p-card-h     { font-size:27px; font-weight:700; color:#16241f; }
.p-card-hen   { font-size:19px; font-weight:500; color:#7a8c85; }
.p-card-zh    { margin-top:9px; font-size:22px; line-height:1.58; color:#4b5d56; }
.p-card-hl    { color:#0b7a60; font-weight:700; }
.p-card-en    { margin-top:6px; font-size:18px; line-height:1.5; color:#849790; }

.p-spacer     { flex:1; }

.p-cta {
  display:flex; align-items:center; justify-content:center; gap:14px;
  width:100%; background:#0e9e7e; border:none; border-radius:16px;
  padding:24px 28px; margin-bottom:16px;
  box-shadow:0 8px 22px rgba(14,158,126,.28);
  cursor:pointer; transition:background .15s,box-shadow .15s;
}
.p-cta:hover  { background:#0b8a6e; box-shadow:0 10px 28px rgba(14,158,126,.36); }
.p-cta-main   { font-family:'Noto Sans TC',sans-serif; font-size:30px; font-weight:900; color:#fff; letter-spacing:.5px; }
