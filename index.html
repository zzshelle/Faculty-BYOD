<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>教師無線網路試營運 — 臺北市立中正高中</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* ── base ── */
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; font-family: 'Noto Sans TC', sans-serif; background: #e9f1ed; }
        h1,h2,h3,h4 { margin: 0; }
        p { margin: 0; }
        a { text-decoration: none; }
        button { cursor: pointer; border: none; background: none; font-family: inherit; }

        /* ── page shell ── */
        .page {
          padding: 48px 24px;
          display: flex;
          justify-content: center;
          align-items: flex-start;
        }

        /* ── poster style ── */
        .poster {
          position: relative;
          width: 100%;
          max-width: 800px; /* 這裡原先為 1240px，為了手機適配調整為最大 800px */
          background: #ffffff;
          box-shadow: 0 8px 40px rgba(11,59,51,.14);
          overflow: hidden;
          border-radius: 16px;
        }
        .p-accent { position:absolute; top:0; left:0; bottom:0; width:18px; background:#0e9e7e; }
        .p-body   { padding: 60px 40px 60px 60px; display:flex; flex-direction:column; gap: 24px; }

        .p-header     { display:flex; justify-content:space-between; align-items:flex-start; font-size:18px; color:#5d7068; font-weight:500; }
        .p-org-name   { font-weight:700; color:#16241f; }
        .p-org-sub    { font-family:'IBM Plex Mono',monospace; font-size:14px; color:#8a9a93; margin-top:4px; }
        .p-badge      { font-family:'IBM Plex Mono',monospace; color:#0e9e7e; font-weight: bold; }

        .p-title      { margin-top:10px; }
        .p-tag        { display:inline-block; background:#e7f4ef; color:#0b7a60; font-size:16px; font-weight:700; padding:6px 14px; border-radius:8px; }
        .p-h1         { margin:14px 0 0; font-size:40px; font-weight:900; line-height:1.2; color:#16241f; }
        .p-subtitle   { margin-top:8px; font-size:20px; font-weight:500; color:#3f8f7c; }

        .p-card       { background:#f1f8f5; border-radius:18px; padding:24px; display:flex; gap:16px; }
        .p-card-num   { font-size:28px; font-weight:900; color:#0e9e7e; }
        .p-card-h     { font-size:20px; font-weight:700; color:#16241f; }
        .p-card-zh    { margin-top:6px; font-size:15px; line-height:1.6; color:#4b5d56; }

        .p-cta {
          display:flex; align-items:center; justify-content:center;
          width:100%; background:#0e9e7e; border-radius:16px;
          padding:18px; margin-top: 20px;
          box-shadow:0 8px 22px rgba(14,158,126,.28);
          transition: background .15s;
        }
        .p-cta:hover  { background:#0b8a6e; }
        .p-cta-main   { font-size:20px; font-weight:900; color:#fff; }
    </style>
</head>
<body>

    <!-- 這裡補上實際的 HTML 內容，網頁才會有畫面 -->
    <div class="page" id="page-poster">
        <div class="poster">
            <div class="p-accent"></div>
            <div class="p-body">
                
                <!-- 頁首 -->
                <div class="p-header">
                    <div>
                        <div class="p-org-name">臺北市立中正高中</div>
                        <div class="p-org-sub">Taipei Municipal Zhongzheng Senior High School</div>
                    </div>
                    <div class="p-badge">BYOD WI-FI</div>
                </div>

                <!-- 標題區 -->
                <div class="p-title">
                    <span class="p-tag">試營運 / Beta Test</span>
                    <h1 class="p-h1">教師自備載具無線網路</h1>
                    <div class="p-subtitle">教職員 Wi-Fi 連線與網卡登記系統</div>
                </div>

                <!-- 卡片區 1 -->
                <div class="p-card">
                    <div class="p-card-num">01</div>
                    <div class="p-card-body">
                        <div class="p-card-h">首次申請（登記網卡）</div>
                        <div class="p-card-zh">請連線至 <span class="font-bold text-emerald-700">Teacher-Apply</span>，並關閉「隨機 MAC」功能。</div>
                    </div>
                </div>

                <!-- 卡片區 2 -->
                <div class="p-card">
                    <div class="p-card-num">02</div>
                    <div class="p-card-body">
                        <div class="p-card-h">日常連線</div>
                        <div class="p-card-zh">完成登記後，往後請直接連線至 <span class="font-bold text-emerald-700">Teacher-Connect</span> 正式上網。</div>
                    </div>
                </div>

                <!-- 按鈕 -->
                <button class="p-cta">
                    <span class="p-cta-main">開始進行網路設定</span>
                </button>

            </div>
        </div>
    </div>

</body>
</html>
